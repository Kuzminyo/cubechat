name: cubechat
description: Encrypted peer-to-peer messaging over Bluetooth mesh.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # UI
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.2

  # BLE transport (M1)
  flutter_blue_plus: ^1.34.5
  permission_handler: ^11.3.1

  # Crypto (M2)
  cryptography: ^2.7.0            # X25519, ChaCha20-Poly1305, BLAKE2s, HKDF
  flutter_secure_storage: ^9.2.2  # private key in Keychain / Keystore

  # --- Reserved for upcoming layers ---
  # hive: ^2.2.3                    # M4: message store
  # hive_flutter: ^1.1.0
  # uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
