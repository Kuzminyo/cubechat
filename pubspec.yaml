name: cubechat
description: Encrypted peer-to-peer messaging over Bluetooth mesh.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # UI
  google_fonts: ^6.2.1

  # Storage
  shared_preferences: ^2.3.2

  # BLE transport (M1)
  flutter_blue_plus: ^1.34.5
  permission_handler: ^11.3.1

  # Crypto (M2)
  cryptography: ^2.7.0            # X25519, ChaCha20-Poly1305, BLAKE2s, HKDF
  flutter_secure_storage: ^9.2.2  # private key in Keychain / Keystore

  # Nostr internet fallback (M6) — relay sockets. secp256k1/BIP-340 is
  # implemented in-repo (lib/core/crypto/secp256k1.dart), so no crypto dep.
  web_socket_channel: ^3.0.3

  # Persistence (M4)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Telegram-style gallery: custom device-photo grid picker (multi-select),
  # plus save-to-gallery and share from the in-chat media viewer. (Replaced the
  # one-shot image_picker.)
  photo_manager: ^3.6.0
  share_plus: ^10.1.4
  saver_gallery: ^4.0.1

  # Voice messages (audio capture + playback)
  record: ^6.0.0
  audioplayers: ^6.1.0

  # Local notifications (incoming-message alerts)
  flutter_local_notifications: ^17.2.3
  flutter_native_splash: ^2.4.1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  # Already present transitively via flutter_test; declared so the idle-signal
  # tests can drive its timers without leaning on an undeclared package.
  fake_async: ^1.3.1
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/logo/cube.png
  background_color_ios: "#06140D"
  adaptive_icon_background: "#06140D"
  adaptive_icon_foreground: assets/logo/cube_transparent.png

flutter_native_splash:
  color: "#06140D"
  image: assets/logo/cube.png
  android: true
  ios: true
  android_12:
    color: "#06140D"
    image: assets/logo/cube.png
    icon_background_color: "#06140D"
