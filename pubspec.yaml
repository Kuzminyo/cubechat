name: cubechat
description: Encrypted peer-to-peer messaging over Bluetooth mesh.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State + routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # UI
  google_fonts: ^6.2.1

  # Storage (used by future BLE/Noise layers)
  shared_preferences: ^2.3.2

  # --- Reserved for upcoming layers (kept commented to keep v0 build light) ---
  # flutter_blue_plus: ^1.32.12     # BLE mesh transport
  # cryptography: ^2.7.0            # Noise / X25519 / ChaCha20-Poly1305
  # hive: ^2.2.3                    # message store
  # hive_flutter: ^1.1.0
  # flutter_secure_storage: ^9.2.2  # private key storage
  # uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true
