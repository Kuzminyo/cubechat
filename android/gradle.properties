org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Some plugins (e.g. photo_manager) default their Kotlin JVM target to the JDK's
# (21) while their Java stays at 17, tripping Gradle's consistency check. The
# mixed targets dex fine for Android, so relax the check to a warning.
kotlin.jvm.target.validation.mode=warning
