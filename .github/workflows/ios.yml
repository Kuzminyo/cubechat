name: iOS build (unsigned IPA for sideloading)

# Triggers:
# - every push to main (so each commit produces a fresh IPA)
# - manual run from the Actions tab (Run workflow button)
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    # GitHub-hosted macOS runner — 10× minute multiplier but public repos
    # get unlimited minutes, private repos get 200 free macOS minutes/month.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # Pin Flutter to stable. The version-file mode would point at
      # pubspec.yaml's environment.flutter constraint, but subosito/flutter-
      # action doesn't parse that constraint robustly — explicit version is
      # safer.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.27.1'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pull pub dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Pre-cache iOS artifacts
        run: flutter precache --ios

      # Build a Release .ipa with no signing identity. The output lands at
      # build/ios/ipa/*.ipa. Flutter handles Podfile creation, pod install,
      # and the Xcode archive internally — no manual pod install step needed.
      - name: Build unsigned IPA
        run: flutter build ipa --release --no-codesign --export-method=development

      - name: Show build output
        run: |
          set -e
          echo "Listing build/ios/ipa:"
          ls -lh build/ios/ipa/ || echo "(no ipa directory)"
          echo ""
          echo "Listing build/ios:"
          ls -lh build/ios/ || true

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubechat-ios-unsigned-${{ github.sha }}
          path: build/ios/ipa/*.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: success()
        run: |
          {
            echo "## ✅ iOS build succeeded"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "**Artifact:** \`cubechat-ios-unsigned-${{ github.sha }}\`"
            echo ""
            echo "### How to install on iPhone (free Apple ID, 7-day re-sign)"
            echo "1. Download the artifact from this run (Summary tab → Artifacts)"
            echo "2. Unzip — you'll get \`cubechat.ipa\`"
            echo "3. Open Sideloadly on Windows, plug iPhone via USB"
            echo "4. Drag the IPA into Sideloadly, enter your free Apple ID, click Start"
            echo "5. On iPhone: Settings → General → VPN & Device Management → trust the new profile"
            echo "6. App is valid for 7 days, repeat to refresh"
          } >> "$GITHUB_STEP_SUMMARY"
