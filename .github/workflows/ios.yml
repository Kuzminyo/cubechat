name: iOS build (unsigned IPA for sideloading)

# Triggers:
# - every push to main (so each commit produces a fresh IPA)
# - pushes to the active feature branch, so its changes get an iOS build
#   without merging to main first (remove the branch after it merges)
# - manual run from the Actions tab (Run workflow button)
on:
  push:
    branches: [main, m6-nostr-fallback]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    # GitHub-hosted macOS runner — 10× minute multiplier but public repos
    # get unlimited minutes, private repos get 200 free macOS minutes/month.
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      # Pin Flutter to match the developer's local stable channel.
      # The iOS scaffolding (AppDelegate.swift / SceneDelegate.swift) was
      # generated by Flutter 3.41 and uses FlutterImplicitEngineBridge /
      # FlutterImplicitEngineDelegate / FlutterSceneDelegate — types that
      # don't exist on older Flutter SDKs. Pinning 3.41.x keeps CI and
      # the developer machine on the same APIs.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.x'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pull pub dependencies
        run: flutter pub get

      - name: Generate localization
        run: flutter gen-l10n

      - name: Pre-cache iOS artifacts
        run: flutter precache --ios

      # Build the unsigned .app bundle. `flutter build ipa --no-codesign`
      # only produces an .xcarchive (not an .ipa) because IPA packaging
      # normally happens via xcodebuild -exportArchive which requires a
      # signing identity. So we build with `flutter build ios` and then
      # manually wrap the resulting Runner.app in the Payload/ directory
      # convention that .ipa files use, and zip it. Sideloadly / AltStore
      # accept this format and re-sign with the user's free Apple ID.
      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Show build output
        run: |
          set -e
          echo "build/ios/iphoneos:"
          ls -lh build/ios/iphoneos/ || echo "(missing)"

      - name: Package unsigned IPA
        run: |
          set -e
          cd build/ios/iphoneos
          if [ ! -d Runner.app ]; then
            echo "Runner.app missing — flutter build did not produce a .app"
            exit 1
          fi
          mkdir -p Payload
          cp -R Runner.app Payload/
          zip -qr cubechat-unsigned.ipa Payload
          ls -lh cubechat-unsigned.ipa

      - name: Upload IPA as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cubechat-ios-unsigned-${{ github.sha }}
          path: build/ios/iphoneos/cubechat-unsigned.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        if: success()
        run: |
          {
            echo "## ✅ iOS build succeeded"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo ""
            echo "**Artifact:** \`cubechat-ios-unsigned-${{ github.sha }}\`"
            echo ""
            echo "### How to install on iPhone (free Apple ID, 7-day re-sign)"
            echo "1. Download the artifact from this run (Summary tab → Artifacts)"
            echo "2. Unzip — you'll get \`cubechat.ipa\`"
            echo "3. Open Sideloadly on Windows, plug iPhone via USB"
            echo "4. Drag the IPA into Sideloadly, enter your free Apple ID, click Start"
            echo "5. On iPhone: Settings → General → VPN & Device Management → trust the new profile"
            echo "6. App is valid for 7 days, repeat to refresh"
          } >> "$GITHUB_STEP_SUMMARY"
