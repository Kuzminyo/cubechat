<!DOCTYPE html><html lang="en"><head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Encrypted peer-to-peer messaging over a Bluetooth mesh. No accounts, no phone numbers, no central servers.">
  <meta name="theme-color" content="#06140D">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Cubechat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <title>Cubechat</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #06140D;
      color: #E8E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
      overflow: hidden;
      height: 100%;
      width: 100%;
    }

    /* Loading screen — visible while the Flutter engine boots. */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 15% 20%, rgba(46, 219, 143, 0.45) 0%, transparent 45%),
        radial-gradient(circle at 85% 15%, rgba(127, 217, 166, 0.40) 0%, transparent 40%),
        radial-gradient(circle at 70% 85%, rgba(52, 211, 153, 0.45) 0%, transparent 45%),
        radial-gradient(circle at 20% 90%, rgba(163, 230, 53, 0.35) 0%, transparent 35%),
        linear-gradient(135deg, #0D2818 0%, #0A3D28 100%);
      transition: opacity 400ms ease, visibility 400ms ease;
      z-index: 9999;
    }

    #loader.fade {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cube {
      width: 64px;
      height: 64px;
      transform-style: preserve-3d;
      animation: cube-spin 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 12px rgba(46, 219, 143, 0.45));
    }

    .cube svg { display: block; width: 100%; height: 100%; }

    @keyframes cube-spin {
      0%   { transform: rotateY(0deg)   rotateX(0deg); }
      50%  { transform: rotateY(180deg) rotateX(10deg); }
      100% { transform: rotateY(360deg) rotateX(0deg); }
    }

    .loader-label {
      margin-top: 20px;
      font-size: 13px;
      letter-spacing: 0.04em;
      color: rgba(232, 232, 240, 0.55);
    }
  </style>
  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #06140D;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>
  <div id="loader" aria-hidden="true">
    <div class="cube">
      <!-- Isometric cube SVG that matches the in-app CubeLogoPainter. -->
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="top" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#CFFC56"></stop>
            <stop offset="100%" stop-color="#A3E635"></stop>
          </linearGradient>
          <linearGradient id="right" x1="1" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7BC93C"></stop>
            <stop offset="100%" stop-color="#4C9B23"></stop>
          </linearGradient>
          <linearGradient id="left" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#5BAE2C"></stop>
            <stop offset="100%" stop-color="#2D7211"></stop>
          </linearGradient>
        </defs>
        <!-- top face -->
        <polygon points="50,12 93,31 50,50 7,31" fill="url(#top)"></polygon>
        <!-- right face -->
        <polygon points="93,31 93,69 50,88 50,50" fill="url(#right)"></polygon>
        <!-- left face -->
        <polygon points="7,31 50,50 50,88 7,69" fill="url(#left)"></polygon>
      </svg>
    </div>
    <div class="loader-label">Loading Cubechat…</div>
  </div>

  <script>
    // Hide the loading screen once Flutter renders the first frame.
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('loader');
      if (loader) loader.classList.add('fade');
    });
  </script>
  <script src="flutter_bootstrap.js" async=""></script>


</body></html>
